<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personnel Login - National ID System</title>
  <style>
    :root {
      --primary: #1e5aa8;
      --primary-dark: #17407c;
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe3ef;
      --danger: #dc2626;
      --success: #16a34a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #eaf2ff, #f4f7fb);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
    }

    .login-card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
      padding: 30px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .brand img {
      width: 58px;
      height: 58px;
      object-fit: contain;
      border-radius: 14px;
      background: #eef4ff;
      padding: 6px;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      color: var(--primary);
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.6;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 14px;
    }

    .field label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      font: inherit;
    }

    .field input:focus {
      border-color: var(--primary);
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      background: var(--primary);
      color: white;
    }

    .btn:hover {
      background: var(--primary-dark);
    }

    .notice {
      display: none;
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 13px;
    }

    .notice.show { display: block; }
    .notice.error { background: #fee2e2; color: #991b1b; }
    .notice.success { background: #dcfce7; color: #166534; }

    .help {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <img src="logo-psa.png" alt="PSA Logo">
      <div>
        <h1>Personnel Login</h1>
      </div>
    </div>

    <p class="subtitle">
      Enter your personnel access key to open the National ID admin dashboard.
    </p>

    <div id="loginNotice" class="notice"></div>

    <div class="field">
      <label for="adminSecret">Access Key</label>
      <input id="adminSecret" type="password" placeholder="Enter access key">
    </div>

    <button class="btn" id="loginBtn">Log In</button>

    <p class="help">
      This page is for authorized personnel only.
    </p>
  </div>

  <script>
  const EXEC_URL = "https://script.google.com/macros/s/AKfycbxX_0IvUJD9bf1W71hPYUOsv59cnVSzlwMOenXnEQIiwlzcL8f8XWtk-l4mE5cMjXlN/exec";

  const savedKey = sessionStorage.getItem("nid_access_key");
  const savedRole = sessionStorage.getItem("nid_role");

  if (savedKey && savedRole) {
    window.location.href = "admin.html";
  }

  function showNotice(message, type = "error") {
    const el = document.getElementById("loginNotice");
    el.className = `notice show ${type}`;
    el.textContent = message;
  }

  async function login() {
    const secret = document.getElementById("adminSecret").value.trim();

    if (!secret) {
      showNotice("Please enter the access key.");
      return;
    }

    try {
      const res = await fetch(EXEC_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "login",
          accessKey: secret
        })
      });

      const data = await res.json();

      if (data.status === "error") {
        throw new Error(data.message || "Login failed.");
      }

      if (!data.role) {
        throw new Error("No role returned from server.");
      }

      sessionStorage.setItem("nid_access_key", secret);
      sessionStorage.setItem("nid_role", data.role);

      showNotice(`Login successful as ${data.role}. Redirecting...`, "success");

      setTimeout(() => {
        window.location.href = "admin.html";
      }, 700);
    } catch (err) {
      showNotice(err.message || "Unable to log in.");
    }
  }

  document.getElementById("loginBtn").addEventListener("click", login);

  document.getElementById("adminSecret").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      login();
    }
  });
</script>
</body>
</html>
